name: Build Ayalon APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Install buildozer & dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer_project/buildozer.spec') }}

      - name: Build APK
        run: |
          cd buildozer_project
          buildozer android debug 2>&1 | tee build.log
          grep -i "error\|exception\|failed\|traceback" build.log | tail -30 || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ayalon-apk
          path: buildozer_project/bin/*.apk
          retention-days: 7
